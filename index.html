<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeTimer - Multi-Purpose Timer</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="timer-container">
    <div class="timer-header">
      <h1>VibeTimer</h1>
      <div class="timer-modes">
        <button class="mode-btn active" data-mode="stopwatch">Stopwatch</button>
        <button class="mode-btn" data-mode="countdown">Countdown</button>
        <button class="mode-btn" data-mode="pomodoro">Pomodoro</button>
      </div>
    </div>

    <div class="timer-display" id="display">00:00:00</div>

    <div class="timer-controls">
      <button class="control-btn" id="startBtn">Start</button>
      <button class="control-btn" id="pauseBtn" disabled>Pause</button>
      <button class="control-btn" id="resetBtn">Reset</button>
    </div>

    <div class="timer-settings">
      <div class="settings-section" id="countdown-settings">
        <h3>Countdown Settings</h3>
        <div class="input-group">
          <input type="number" id="hours-input" min="0" max="23" placeholder="00">
          <span>:</span>
          <input type="number" id="minutes-input" min="0" max="59" placeholder="00">
          <span>:</span>
          <input type="number" id="seconds-input" min="0" max="59" placeholder="00">
        </div>
      </div>

      <div class="settings-section" id="pomodoro-settings">
        <h3>Pomodoro Settings</h3>
        <div class="input-group">
          <label>
            <span>Work (min):</span>
            <input type="number" id="work-time" min="1" max="60" value="25">
          </label>
          <label>
            <span>Break (min):</span>
            <input type="number" id="break-time" min="1" max="30" value="5">
          </label>
          <label>
            <span>Long Break (min):</span>
            <input type="number" id="long-break-time" min="1" max="60" value="15">
          </label>
          <label>
            <span>Sessions:</span>
            <input type="number" id="sessions" min="1" max="10" value="4">
          </label>
        </div>
      </div>
    </div>

    <div class="timer-laps" id="laps-container">
      <h3>Laps</h3>
      <div class="laps-list" id="laps-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
